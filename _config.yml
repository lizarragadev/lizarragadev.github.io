# Site settings
title: Gustavo Lizárraga
description: 'Viajes. Eventos. Actividades y otros.'
description1: '🚩 GitHub Campus Expert'
description2: '⭐ Auth0 Ambassador'
description3: '🦑 GitKraken Ambassador'
description4: '💚 Android & 🤍iOS Dev'
description5: '🎓 Trainer.  🎤 Speaker.'
url: 'https://lizarraga.dev'
baseurl: 'https://lizarraga.dev'
# url: '/'
# baseurl: '/lizarraga.dev'
google_analytics: 'UA-156509877-1'
disqus_shortname: 'lizarragadev'

author:
  name: 'Gustavo Lizárraga'
  email: lizarraga.dev@gmail.com
  twitter_username: lizarragadev
  facebook_username: lizarraga.dev
  github_username:  lizarragadev
  linkedin_username:  lizarragadev
  instagram_username:  lizarraga.dev
  speakerdeck_username:  lizarragadev

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

sass:
    sass_dir: _sass
    style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins: ['jekyll-paginate']
exclude: ['README.md', 'Gemfile', 'Gemfile.lock']

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: true
  startings: [head, body]